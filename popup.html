<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术生词采集器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            width: 400px;
            background: #f5f5f5;
        }
        .header {
            background: #4285f4;
            color: white;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-container {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .vocab-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 0;
            margin: 0;
        }
        .vocab-item {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .vocab-item:hover {
            background: #f8f8f8;
        }
        .vocab-item.expanded {
            background: #f0f7ff;
        }
        .vocab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .vocab-word {
            font-weight: 500;
            font-size: 15px;
        }
        .vocab-translation {
            color: #666;
            font-size: 14px;
        }
        .vocab-source {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }
        .vocab-time {
            color: #999;
            font-size: 12px;
        }
        .vocab-detail {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
            display: none;
        }
        .vocab-detail.show {
            display: block;
        }
        .detail-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .detail-label {
            font-weight: 500;
            color: #666;
            width: 60px;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex: 1;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }
        .export-btn {
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            margin: 12px 16px;
            width: calc(100% - 32px);
        }
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #999;
            font-size: 14px;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="header">
        学术生词采集器
    </div>
    
    <div class="search-container">
        <input type="text" class="search-input" placeholder="搜索生词..." id="searchInput">
    </div>
    
    <div class="vocab-list" id="vocabList">
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📚</div>
            <div>暂无保存的生词</div>
        </div>
    </div>
    
    <button class="export-btn" id="exportBtn">导出为JSON</button>

    <script src="popup.js"></script>
</body>
</html>
